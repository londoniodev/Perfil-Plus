version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mauro-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mauroweb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mauro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mauro-minio
    restart: always
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - mauro-network
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${S3_BUCKET_PUBLIC:-mauro-public};
      /usr/bin/mc mb myminio/${S3_BUCKET_PRIVATE:-mauro-private};
      /usr/bin/mc anonymous set download myminio/${S3_BUCKET_PUBLIC:-mauro-public};
      /usr/bin/mc anonymous set none myminio/${S3_BUCKET_PRIVATE:-mauro-private};
      exit 0;
      "
    networks:
      - mauro-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mauro-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mauroweb}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: 7
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-mauro-web}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    networks:
      - mauro-network
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: mauro-web
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - mauro-network
    ports:
      - "3000:3000"

networks:
  mauro-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
